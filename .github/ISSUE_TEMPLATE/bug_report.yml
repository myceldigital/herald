name: Bug report
description: Report a reproducible Herald bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include the exact command and enough input context to reproduce the issue.
        If the problem is really about a specific public guideline converting or parsing badly, use the guideline compatibility template instead.

  - type: input
    id: version
    attributes:
      label: Herald version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command run
      placeholder: e.g. herald parse guideline.md -o guideline.json
    validations:
      required: true

  - type: dropdown
    id: input_type
    attributes:
      label: Input type
      options:
        - Synthetic example
        - Real guideline PDF
        - Markdown generated by herald convert
        - Parsed guideline JSON
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Share a minimal command sequence, snippet, or synthetic input if possible.
      render: shell
    validations:
      required: false
